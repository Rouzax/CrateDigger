site_name: CrateDigger
site_url: https://rouzax.github.io/CrateDigger/docs/
repo_url: https://github.com/Rouzax/CrateDigger
repo_name: Rouzax/CrateDigger

# Write build output under build/ (already in .gitignore) instead of the
# default ./site, which holds the hand-authored landing page committed to
# the repo. The CI workflow (.github/workflows/deploy-docs.yml) already
# builds into build/docs; aligning the default keeps bare `mkdocs build`
# from overwriting site/index.html, site/style.css, and site/assets/.
site_dir: build/docs

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: orange
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands:
      - Identify: commands/identify.md
      - Organize: commands/organize.md
      - Enrich: commands/enrich.md
      - Audit Logos: commands/audit-logos.md
  - Configuration: configuration.md
  - Festivals: festivals.md
  - 1001Tracklists: tracklists.md
  - Tag reference: tag-reference.md
  - Kodi Integration: kodi-integration.md
  - FAQ: faq.md
