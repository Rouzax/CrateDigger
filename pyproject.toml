[project]
name = "cratedigger"
version = "0.9.7"
description = "Festival set & concert library manager"
requires-python = ">=3.11"
dependencies = [
    "Pillow>=10.0",
    "numpy>=1.24",
    "requests>=2.28",
    "rich>=13.0",
    "typer>=0.9",
]

[project.optional-dependencies]
vision = [
    "opencv-python-headless>=4.8",
]
all = [
    "cratedigger[vision]",
]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.10",
]

[tool.setuptools.packages.find]
include = ["festival_organizer*"]

[tool.setuptools.package-data]
"festival_organizer" = ["fonts/*.ttf"]

[project.scripts]
cratedigger = "festival_organizer.cli:run"
