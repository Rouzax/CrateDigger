# CrateDigger configuration.
# Copy to Documents\CrateDigger\config.toml (Windows) or ~/CrateDigger/config.toml (Linux).
# A per-library override at {library}/.cratedigger/config.toml wins over this file.
# Only include settings you want to override; defaults are built in.

# Folder structure. Available layouts: artist_flat, festival_flat, artist_nested, festival_nested.
default_layout = "artist_flat"

# Glob patterns for paths to skip during scanning. Must stay above every
# [section] header; otherwise TOML absorbs it into the preceding section and
# the loader silently ignores it.
skip_patterns = ["*/BDMV/*", "Dolby*"]

# Folder templates per layout type. Tokens: {artist}, {festival}, {edition}, {year}, {title}.
[layouts.artist_flat]
festival_set = "{artist}"
concert_film = "{artist}"

[layouts.festival_flat]
festival_set = "{festival}{ edition}"
concert_film = "{artist}"

[layouts.artist_nested]
festival_set = "{artist}/{festival}{ edition}/{year}"
concert_film = "{artist}/{year} - {title}"

[layouts.festival_nested]
festival_set = "{festival}{ edition}/{year}/{artist}"
concert_film = "{artist}/{year} - {title}"

# File naming templates. Use Sonarr-style collapsing syntax for optional fields.
[filename_templates]
festival_set = "{year} - {artist} - {festival}{ edition}{ [stage]}{ - set_title}"
concert_film = "{artist} - {title}{ (year)}"

# Glob patterns to force classification. Paths are relative to library root.
[content_type_rules]
force_concert = ["Adele/*", "Coldplay/*", "U2/*"]
force_festival = []

# Recognized media file extensions, grouped by type.
[media_extensions]
video = [".mp4", ".mkv", ".webm", ".avi", ".mov", ".m2ts", ".ts"]
audio = [".mp3", ".m4a", ".flac", ".wav", ".aac", ".ogg", ".opus"]

# Placeholder values when metadata is missing.
[fallback_values]
unknown_artist = "Unknown Artist"
unknown_festival = "_Needs Review"
unknown_year = "Unknown Year"
unknown_title = "Unknown Title"

# Background image priority chains for poster generation.
[poster_settings]
artist_background_priority = ["dj_artwork", "fanart_tv", "gradient"]
festival_background_priority = ["curated_logo", "gradient"]
year_background_priority = ["gradient"]

# 1001Tracklists credentials for chapter embedding. Optional.
[tracklists]
email = ""
password = ""
delay_seconds = 5
chapter_language = "eng"
auto_select = false
# Cap on per-track genres collected into the album-level tag. 0 disables the cap.
genre_top_n = 5

# fanart.tv settings. The project API key is built in.
# Add your personal key for faster cache updates (get one at https://fanart.tv/get-an-api-key/).
[fanart]
personal_api_key = ""
enabled = true

# Kodi JSON-RPC settings. Enable to auto-refresh Kodi after enrichment.
# Path mapping is auto-detected from the Kodi library.
[kodi]
enabled = false
host = "localhost"
port = 8080
username = "kodi"
password = ""

# Genre tags written into NFO files.
[nfo_settings]
genre_festival = "Electronic"
genre_concert = "Live"

# Set tool paths only if they are not on your PATH. TOML has no null; omit a
# key (or leave an empty string) to auto-detect via PATH. The whole section
# is optional, so it is commented out by default.
# [tool_paths]
# mediainfo = "C:/Program Files/MediaInfo/MediaInfo.exe"
# ffprobe = ""
# mkvextract = ""
# mkvpropedit = ""
# mkvmerge = ""

# Base lifetimes for CrateDigger's caches, in days. Each entry's actual
# lifetime jitters by +/- 20% around these values so a bulk first-run fill
# does not cause all entries to expire at the same time.
[cache_ttl]
mbid_days = 90
dj_days = 90
source_days = 365
images_days = 90
