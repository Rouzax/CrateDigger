# CrateDigger configuration.
# Copy to Documents\CrateDigger\config.toml (Windows) or ~/CrateDigger/config.toml (Linux).
# A per-library override at {library}/.cratedigger/config.toml wins over this file.
# Only include settings you want to override; defaults are built in.

# Folder structure. Available layouts: artist_flat, place_flat, artist_nested, place_nested.
default_layout = "artist_flat"

# Glob patterns for paths to skip during scanning. Must stay above every
# [section] header; otherwise TOML absorbs it into the preceding section and
# the loader silently ignores it.
skip_patterns = ["*/BDMV/*", "Dolby*"]

# Folder templates per layout type. Tokens: {artist}, {place}, {edition}, {year}, {title}.
[layouts.artist_flat]
festival_set = "{artist}"
concert_film = "{artist}"

[layouts.place_flat]
festival_set = "{place}{ edition}"
concert_film = "{artist}"

[layouts.artist_nested]
festival_set = "{artist}/{place}{ edition}/{year}"
concert_film = "{artist}/{year} - {title}"

[layouts.place_nested]
festival_set = "{place}{ edition}/{year}/{artist}"
concert_film = "{artist}/{year} - {title}"

# File naming templates. Use Sonarr-style collapsing syntax for optional fields.
[filename_templates]
festival_set = "{year} - {artist}{ - place}{ edition}{ [stage]}{ - set_title}"
concert_film = "{artist} - {title}{ (year)}"

# Glob patterns to force classification. Paths are relative to library root.
[content_type_rules]
force_concert = ["Adele/*", "Coldplay/*", "U2/*"]
force_festival = []

# Recognized media file extensions, grouped by type.
[media_extensions]
video = [".mp4", ".mkv", ".webm", ".avi", ".mov", ".m2ts", ".ts"]
audio = [".mp3", ".m4a", ".flac", ".wav", ".aac", ".ogg", ".opus"]

# Placeholder values when metadata is missing.
[fallback_values]
unknown_artist = "Unknown Artist"
# unknown_place is the folder name used when a set cannot be matched to any
# known place (festival, venue, club, etc.).
unknown_place = "_Needs Review"
unknown_year = "Unknown Year"
unknown_title = "Unknown Title"

# Background image priority chains for poster generation.
[poster_settings]
artist_background_priority = ["dj_artwork", "fanart_tv", "gradient"]
# place_background_priority sets the order CrateDigger tries when generating
# a poster background for a place folder (festival, venue, club, etc.).
place_background_priority = ["curated_logo", "gradient"]
year_background_priority = ["gradient"]

# 1001Tracklists credentials for chapter embedding. Optional.
[tracklists]
email = ""
password = ""
delay_seconds = 5
chapter_language = "eng"
auto_select = false
# Cap on per-track genres collected into the album-level tag. 0 disables the cap.
genre_top_n = 5
# Layered "w/" overlay chapters and mashup metadata (see docs/tracklists.md).
# overlay_chapters: master switch. false = only main-track chapters (pre-0.30.0).
overlay_chapters = true
# overlay_fold_seconds: an overlay entering at least this many seconds after its
# host main track becomes its own chapter; closer ones fold in as "A vs. B".
# 0 = every timecoded overlay its own chapter; large = fold everything into the host.
overlay_fold_seconds = 20
# mashup_metadata: harvest real per-component artists/genres/labels from "vs."
# mashup sub-rows into the per-chapter tags (instead of one concatenated artist).
mashup_metadata = true
# chapter_title_labels: keep the record-company [Label] in the visible chapter
# title. false (default) writes the label only to the CRATEDIGGER_TRACK_LABEL tag.
chapter_title_labels = false

# fanart.tv settings. The project API key is built in.
# Add your personal key for faster cache updates (get one at https://fanart.tv/get-an-api-key/).
[fanart]
personal_api_key = ""
enabled = true

# Kodi JSON-RPC settings. Enable to auto-refresh Kodi after enrichment.
# Path mapping is auto-detected from the Kodi library.
[kodi]
enabled = false
host = "localhost"
port = 8080
username = "kodi"
password = ""

# Email notifications. Three independent channels, each with its own recipients.
# new_sets   -> sent after `organize` when sets were added (to you + others)
# updated_sets -> sent after `identify` when chapters changed (to you)
# update_reminder -> sent (any command) when a newer CrateDigger is available, once per version
# The SMTP password may instead be set via the CRATEDIGGER_SMTP_PASSWORD env var (preferred).
# [email]
# smtp_host = "mail.example.lan"
# smtp_port = 587
# smtp_security = "starttls"   # starttls | ssl | none
# smtp_user = "cratedigger"
# smtp_password = ""
# from_address = "cratedigger@example.lan"
# thumbnail_width = 140
#
# [email.new_sets]
# enabled = true
# to = ["you@example.com", "other@example.com"]
#
# [email.updated_sets]
# enabled = true
# to = ["you@example.com"]
#
# [email.update_reminder]
# enabled = true
# to = ["you@example.com"]

# Genre tags written into NFO files.
[nfo_settings]
genre_festival = "Electronic"
genre_concert = "Live"

# Set tool paths only if they are not on your PATH. TOML has no null; omit a
# key (or leave an empty string) to auto-detect via PATH. The whole section
# is optional, so it is commented out by default.
# [tool_paths]
# ffprobe = "C:/Program Files/ffmpeg/bin/ffprobe.exe"
# mkvextract = ""
# mkvpropedit = ""
# mkvmerge = ""

# Base lifetimes for CrateDigger's caches, in days. Each entry's actual
# lifetime jitters by +/- 20% around these values so a bulk first-run fill
# does not cause all entries to expire at the same time.
[cache_ttl]
mbid_days = 90
dj_days = 90
source_days = 365
images_days = 90
